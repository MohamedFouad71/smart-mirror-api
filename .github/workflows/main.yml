name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"  # triggers on semantic version tags like v1.0.0, v2.1.3, etc.
  pull_request:
    branches:
      - main
    
jobs:
  ##########
  # Tests
  ##########
  test_and_lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm install

      - name: Run lints
        run: npm run lint --if-present

      - name: Run tests
        run: npm test

  ##########
  # CodeQL Security Analysis
  ##########
  codeql-security-analysis:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # required for all workflows
      security-events: write

      # required to fetch internal or private CodeQL packs
      packages: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: actions
            build-mode: none
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version: "24"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  ##########
  # Build and Push
  ##########
  build_and_push:
    needs: [test_and_lint, codeql-security-analysis]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Docker Login
        uses: docker/login-action@v3.7.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker Build
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/smart-mirror-api:latest .

      - name: Docker Tag
        run: |
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/smart-mirror-api:latest \
          ${{ secrets.DOCKERHUB_USERNAME }}/smart-mirror-api:${{ github.sha }}
          
          # Tag the image with the semantic tag if it exists
          if [ "${{ github.ref_type }}" = "tag" ]; then
            docker tag ${{ secrets.DOCKERHUB_USERNAME }}/smart-mirror-api:latest \
            ${{ secrets.DOCKERHUB_USERNAME }}/smart-mirror-api:${{ github.ref_name }}
          fi

      - name: Docker Push
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smart-mirror-api:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/smart-mirror-api:${{ github.sha }}
          
          # Push the tag if it exists (semantic release) 
          if [ "${{ github.ref_type }}" = "tag" ]; then
            docker push ${{ secrets.DOCKERHUB_USERNAME }}/smart-mirror-api:${{ github.ref_name }}
          fi

  ##########
  # Build and Push
  ##########
  notify_team:
      needs: build_and_push
      runs-on: ubuntu-latest
      steps: 
        - name: Send Pipeline Email to Team
          run: |
            # 1. Define your team emails (separated by spaces)
            TEAM_EMAILS="${{ secrets.TEAM_EMAILS }}"

            # 2. Start the loop
            for EMAIL in $TEAM_EMAILS; do
              echo "Sending email to $EMAIL..."
              
              # 3. Create a personalized message
              cat <<EOF > message.txt
            From: Pipeline Bot <mohamed.fouad.softwareengineer@gmail.com>
            To: $EMAIL
            Subject: [${{ github.repository }}] Push to ${{ github.ref_name }}
            MIME-Version: 1.0
            Content-Type: text/html; charset=UTF-8

            <div style="font-family: Arial, sans-serif; background-color: #000000; color: #ffffff; padding: 40px 20px; text-align: center;">
              <div style="max-width: 500px; margin: auto; border: 1px solid #333333; border-radius: 12px; padding: 30px; background-color: #0a0a0a;">
              
                <p style="font-size: 16px; color: #cccccc; line-height: 1.5;">
                  <b style="color: #ffffff;">${{ github.actor }}</b> has pushed to the <span style="color: #00ffcc;">${{ github.ref_name }}</span> branch in <b style="color: #ffffff;">${{ github.repository }}</b>.
                </p>
                
                <p style="font-size: 18px; color: #00ffcc; font-weight: bold;">
                  The automation pipeline has finished running successfully!
                </p>
                
                <div style="margin: 25px 0; padding: 15px; border-left: 3px solid #00ffcc; background-color: #111111; text-align: left;">
                  <p style="margin: 0; font-size: 12px; color: #888888; text-transform: uppercase; letter-spacing: 1px;">Commit Message:</p>
                  <p style="margin: 5px 0 0 0; font-family: monospace; color: #ffffff;">${{ github.event.head_commit.message }}</p>
                </div>

                <div style="margin-top: 30px;">
                  <a href="${{ github.event.head_commit.url }}" style="display: inline-block; background-color: transparent; color: #00ffcc; border: 1px solid #00ffcc; padding: 12px 24px; text-decoration: none; border-radius: 30px; font-size: 14px; font-weight: bold;">View the code changes here</a>
                </div>
              </div>
            </div>
            EOF
              
              # 4. Send the email via Brevo
              curl --ssl-reqd \
                --silent \
                --show-error \
                --url "smtps://smtp-relay.brevo.com:465" \
                --user "${{ secrets.BREVO_SMTP_USER }}:${{ secrets.BREVO_SMTP_PASSWORD }}" \
                --mail-from "mf2976527@gmail.com" \
                --mail-rcpt "$EMAIL" \
                --upload-file message.txt
                
            done